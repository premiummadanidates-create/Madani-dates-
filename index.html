<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Madani Dates</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<meta name="description" content="Madani Dates Premium Quality Ajwa, Mabroom, Medjool Dates available online.">
<meta name="keywords" content="Ajwa Dates, Medjool Dates, Mabroom Dates, Buy Dates Online">
<meta name="robots" content="index,follow">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<style>

/* GLOBAL */

body{
margin:0;
font-family:Segoe UI, Arial;
background:#f4f6f8;
}

/* HEADER */

header{
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 25px;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

.logo{
font-size:24px;
font-weight:700;
color:#0f9d58;
}

.menu a{
margin-left:20px;
text-decoration:none;
color:#333;
font-weight:600;
}

.logout{
background:#ff4d4d;
color:white;
padding:8px 14px;
border-radius:8px;
}

/* HERO */

.hero{
padding:90px 20px;
background:linear-gradient(135deg,#0f9d58,#084f28);
color:white;
text-align:center;
border-bottom-left-radius:60px;
border-bottom-right-radius:60px;
}

.hero h2{
font-size:34px;
margin-bottom:8px;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
padding:40px;
}

.card{
background:white;
border-radius:22px;
padding:18px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
position:relative;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:15px;
}

/* DISCOUNT */

.discount{
position:absolute;
top:12px;
left:12px;
background:red;
color:white;
font-size:12px;
padding:6px 12px;
border-radius:20px;
}

/* PRICE */

.old{
text-decoration:line-through;
color:#888;
font-size:14px;
}

.price{
color:#0f9d58;
font-size:20px;
font-weight:700;
margin-top:2px;
}

/* CART BUTTON */

.add{
background:black;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:12px;
margin-top:12px;
cursor:pointer;
font-weight:600;
}

/* QUANTITY CONTROL */

.qty{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-top:12px;
}

.qty button{
background:black;
color:white;
border:none;
width:32px;
height:32px;
border-radius:50%;
font-size:18px;
cursor:pointer;
}

.qty span{
font-weight:bold;
font-size:16px;
}

/* OUT OF STOCK */

.stock-stamp{
position:absolute;
top:28%;
left:50%;
transform:translate(-50%,-50%) rotate(-20deg);
width:160px;
opacity:0.95;
pointer-events:none;
}

.out-card{
opacity:0.6;
}

/* FLOAT CART */

.cart-float{
position:fixed;
bottom:25px;
right:25px;
background:#0f9d58;
color:white;
padding:15px 22px;
border-radius:35px;
font-weight:600;
box-shadow:0 8px 25px rgba(0,0,0,0.25);
cursor:pointer;
}

.cart-count{
background:red;
color:white;
font-size:12px;
padding:3px 7px;
border-radius:50%;
margin-left:6px;
}

/* CONTACT */

.manager{
margin:40px;
background:white;
padding:30px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
text-align:center;
}

.manager button{
padding:12px 20px;
border:none;
border-radius:10px;
margin:8px;
cursor:pointer;
font-weight:600;
}

.call{background:#0f9d58;color:white;}
.whatsapp{background:#25D366;color:white;}
.instagram{background:#E1306C;color:white;}

/* RESPONSIVE */

@media(max-width:600px){

.hero h2{font-size:26px;}

.products{padding:20px;}

}

</style>
</head>

<body>

<header>

<div class="logo">Madani Dates</div>

<div class="menu">
<a href="orders.html">My Orders</a>
<a href="login.html" class="logout">Logout</a>
</div>

</header>


<div class="hero">

<h2>Premium Quality Dates</h2>
<p>Fresh • Organic • Best Prices</p>

</div>


<div class="products" id="products"></div>


<!-- CONTACT -->

<div class="manager">

<h3>Contact Web Manager</h3>

<button class="call"
onclick="window.location='tel:+917977212461'">
📞 Call
</button>

<button class="whatsapp"
onclick="window.open('https://wa.me/917977212461')">
💬 WhatsApp
</button>

<button class="instagram"
onclick="window.open('https://www.instagram.com/madanidatesofficial')">
📷 Instagram
</button>

</div>


<a href="cart.html">
<div class="cart-float">
Go To Cart
<span class="cart-count" id="cartCount">0</span>
</div>
</a>


<script>

const db=firebase.firestore()

let cart=JSON.parse(localStorage.getItem("cart"))||[]

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart))
updateCartCount()
}

function updateCartCount(){

let count=0
cart.forEach(i=>count+=i.qty)
document.getElementById("cartCount").innerText=count

}

/* ADD */

function addCart(name,price){

let item=cart.find(p=>p.name===name)

if(item){
item.qty++
}else{
cart.push({name,price,qty:1})
}

saveCart()
renderProducts()

}

/* MINUS */

function minusCart(name){

let item=cart.find(p=>p.name===name)

if(item){

item.qty--

if(item.qty<=0){
cart=cart.filter(p=>p.name!==name)
}

}

saveCart()
renderProducts()

}

/* LOAD PRODUCTS */

function renderProducts(){

db.collection("products").onSnapshot(snapshot=>{

let html=""

snapshot.forEach(doc=>{

let p=doc.data()

let item=cart.find(i=>i.name===p.name)

let qty=item?item.qty:0

html+=`

<div class="card ${!p.stock ? 'out-card':''}">

<div class="discount">${p.discount||30}%</div>

<img src="${p.image}">

${!p.stock?`<img src="images/out-of-stock.png" class="stock-stamp">`:''}

<h3>${p.name}</h3>

<div class="old">₹${p.oldPrice}</div>
<div class="price">₹${p.price}</div>

${p.stock?

qty==0?

`<button class="add" onclick="addCart('${p.name}',${p.price})">
Add To Cart
</button>`

:

`<div class="qty">

<button onclick="minusCart('${p.name}')">-</button>

<span>${qty}</span>

<button onclick="addCart('${p.name}',${p.price})">+</button>

</div>`

:

`<button class="add" disabled>Out Of Stock</button>`

}

</div>

`

})

document.getElementById("products").innerHTML=html

})

}

updateCartCount()
renderProducts()

</script>

</body>
</html>
