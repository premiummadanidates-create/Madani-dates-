<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Madani Dates</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f6f8;
}

/* HEADER */

header{
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.logo{
font-size:22px;
font-weight:600;
color:#0f9d58;
}

/* HERO */

.hero{
padding:80px 20px;
background:linear-gradient(135deg,#0f9d58,#0b5c2e);
color:white;
text-align:center;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:25px;
padding:40px;
}

.card{
background:white;
border-radius:18px;
padding:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
}

.price{
color:#0f9d58;
font-size:18px;
font-weight:700;
}

.add{
background:black;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:10px;
margin-top:12px;
cursor:pointer;
}

.cart-float{
position:fixed;
bottom:25px;
right:25px;
background:#0f9d58;
color:white;
padding:15px 22px;
border-radius:30px;
font-weight:600;
}

</style>
</head>

<body>

<header>

<div class="logo">Madani Dates</div>

<a href="orders.html">My Orders</a>

</header>

<div class="hero">

<h2>Premium Quality Dates</h2>
<p>Fresh • Organic • Best Prices</p>

</div>

<div class="products" id="products"></div>

<a href="cart.html">

<div class="cart-float">
Go To Cart
</div>

</a>

<script>

const auth = firebase.auth();
const db = firebase.firestore();

/* LOAD PRODUCTS */

db.collection("products").onSnapshot(snapshot=>{

let html="";

snapshot.forEach(doc=>{

let p=doc.data();

html+=`

<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<div class="price">₹${p.price}</div>

<button class="add"
onclick="addCart('${p.name}',${p.price})">

Add To Cart

</button>

</div>

`;

});

document.getElementById("products").innerHTML=html;

});


/* ADD CART */

function addCart(name,price){

const user = auth.currentUser;

/* LOGIN CHECK */

if(!user){

window.location="login.html";
return;

}

/* USER CART */

let key="cart_"+user.email;

let cart=JSON.parse(localStorage.getItem(key))||[];

let item=cart.find(p=>p.name===name);

if(item){

item.qty++;

}else{

cart.push({
name:name,
price:price,
qty:1
});

}

localStorage.setItem(key,JSON.stringify(cart));

alert("Added to cart");

}

</script>

</body>
</html>
