<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Madani Dates</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f6f8;
}

/* HEADER */

header{
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.logo{
font-size:22px;
font-weight:700;
color:#0f9d58;
}

.menu a{
margin-left:20px;
text-decoration:none;
color:#333;
font-weight:600;
}

/* HERO */

.hero{
padding:80px 20px;
background:linear-gradient(135deg,#0f9d58,#0b5c2e);
color:white;
text-align:center;
border-bottom-left-radius:60px;
border-bottom-right-radius:60px;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:25px;
padding:40px;
}

/* CARD */

.card{
background:white;
border-radius:18px;
padding:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
position:relative;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
}

/* DISCOUNT */

.discount{
position:absolute;
top:12px;
left:12px;
background:red;
color:white;
padding:4px 8px;
font-size:12px;
border-radius:6px;
}

/* PRICE */

.price{
color:#0f9d58;
font-size:18px;
font-weight:700;
}

.old{
text-decoration:line-through;
color:#888;
margin-left:6px;
font-size:14px;
}

/* BUTTON */

.add{
background:black;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:10px;
margin-top:12px;
cursor:pointer;
}

/* CART FLOAT */

.cart-float{
position:fixed;
bottom:25px;
right:25px;
background:#0f9d58;
color:white;
padding:15px 22px;
border-radius:30px;
font-weight:600;
box-shadow:0 8px 25px rgba(0,0,0,0.25);
cursor:pointer;
}

</style>

</head>

<body>

<header>

<div class="logo">Madani Dates</div>

<div class="menu">
<a href="orders.html">My Orders</a>
</div>

</header>

<div class="hero">

<h2>Premium Quality Dates</h2>
<p>Fresh • Organic • Best Prices</p>

</div>

<div class="products" id="products"></div>

<a href="cart.html">
<div class="cart-float">
Go To Cart
</div>
</a>

<script>

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser=null;

/* LOGIN STATE */

auth.onAuthStateChanged(user=>{
currentUser=user;
});

/* LOAD PRODUCTS FROM FIRESTORE */

db.collection("products").onSnapshot(snapshot=>{

let html="";

snapshot.forEach(doc=>{

let p=doc.data();

html+=`

<div class="card">

<div class="discount">${p.discount || ""}</div>

<img src="${p.image}">

<h3>${p.name}</h3>

<div class="price">

₹${p.price}

<span class="old">₹${p.oldPrice || ""}</span>

</div>

<button class="add"
onclick="addCart('${p.name}',${p.price})">

Add To Cart

</button>

</div>

`;

});

document.getElementById("products").innerHTML=html;

});

/* ADD TO CART */

function addCart(name,price){

if(!currentUser){

window.location="login.html";
return;

}

let key="cart_"+currentUser.email;

let cart=JSON.parse(localStorage.getItem(key))||[];

let item=cart.find(p=>p.name===name);

if(item){
item.qty++;
}else{
cart.push({
name:name,
price:price,
qty:1
});
}

localStorage.setItem(key,JSON.stringify(cart));

alert("Added to cart");

}

</script>

</body>
</html>
