<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Madani Dates</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f6f8;
}

header{
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.logo{
font-size:22px;
font-weight:600;
color:#0f9d58;
}

.menu a{
margin-left:18px;
text-decoration:none;
color:#333;
font-weight:600;
}

.hero{
padding:80px 20px;
background:linear-gradient(135deg,#0f9d58,#0b5c2e);
color:white;
text-align:center;
border-bottom-left-radius:60px;
border-bottom-right-radius:60px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:25px;
padding:40px;
}

.card{
background:white;
border-radius:18px;
padding:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
}

.price{
color:#0f9d58;
font-size:18px;
font-weight:700;
}

.old{
text-decoration:line-through;
color:#888;
font-size:14px;
}

.discount{
position:absolute;
background:red;
color:white;
font-size:12px;
padding:5px 10px;
border-radius:20px;
margin-top:-10px;
}

.add{
background:black;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:10px;
margin-top:12px;
cursor:pointer;
font-weight:600;
}

.qty{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
align-items:center;
}

.qty button{
width:32px;
height:32px;
border:none;
border-radius:50%;
background:#0f9d58;
color:white;
cursor:pointer;
font-size:16px;
}

.cart-float{
position:fixed;
bottom:25px;
right:25px;
background:#0f9d58;
color:white;
padding:15px 22px;
border-radius:30px;
font-weight:600;
box-shadow:0 8px 25px rgba(0,0,0,0.25);
cursor:pointer;
}

.cart-count{
background:red;
color:white;
font-size:12px;
padding:3px 7px;
border-radius:50%;
margin-left:6px;
}

</style>
</head>

<body>

<header>

<div class="logo">Madani Dates</div>

<div class="menu">
<a href="orders.html">My Orders</a>
<a href="#" onclick="logout()">Logout</a>
</div>

</header>

<div class="hero">

<h2>Premium Quality Dates</h2>
<p>Fresh • Organic • Best Prices</p>

</div>

<div class="products" id="products"></div>

<a href="cart.html">
<div class="cart-float">
Go To Cart
<span class="cart-count" id="cartCount">0</span>
</div>
</a>

<script>

const auth=firebase.auth()
const db=firebase.firestore()

let currentUser=null

auth.onAuthStateChanged(user=>{
currentUser=user
})

let cart=JSON.parse(localStorage.getItem("cart"))||[]

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart))
updateCart()
}

function updateCart(){
let count=0
cart.forEach(i=>count+=i.qty)
document.getElementById("cartCount").innerText=count
}

function addCart(name,price,id){

if(!currentUser){
window.location="login.html"
return
}

let item=cart.find(p=>p.name===name)

if(item){
item.qty++
}else{
cart.push({name:name,price:price,qty:1})
}

saveCart()
showQty(name,price,id)

}

function showQty(name,price,id){

let item=cart.find(p=>p.name===name)

document.getElementById("btn-"+id).innerHTML=`

<div class="qty">

<button onclick="changeQty('${name}',${price},${item.qty-1},'${id}')">-</button>

<span>${item.qty}</span>

<button onclick="changeQty('${name}',${price},${item.qty+1},'${id}')">+</button>

</div>

`

}

function changeQty(name,price,newQty,id){

let item=cart.find(p=>p.name===name)

item.qty=newQty

if(item.qty<1){

cart=cart.filter(p=>p.name!=name)

document.getElementById("btn-"+id).innerHTML=`

<button class="add"
onclick="addCart('${name}',${price},'${id}')">

Add To Cart

</button>

`

}else{

showQty(name,price,id)

}

saveCart()

}

function logout(){
auth.signOut()
}

db.collection("products").onSnapshot(snapshot=>{

let html=""

snapshot.forEach(doc=>{

let p=doc.data()

html+=`

<div class="card">

<div class="discount">${p.discount || ""}</div>

<img src="${p.image}">

<h3>${p.name}</h3>

<div class="old">₹${p.oldPrice || ""}</div>

<div class="price">₹${p.price}</div>

<div id="btn-${doc.id}">

<button class="add"
onclick="addCart('${p.name}',${p.price},'${doc.id}')">

Add To Cart

</button>

</div>

</div>

`

})

document.getElementById("products").innerHTML=html

})

updateCart()

</script>

</body>
</html>
