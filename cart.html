<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Your Cart</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f6f8;
}

header{
background:#0f9d58;
color:white;
padding:18px;
font-size:20px;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
}

.qty{
display:flex;
gap:10px;
align-items:center;
}

.qty button{
width:30px;
height:30px;
border:none;
border-radius:50%;
background:black;
color:white;
cursor:pointer;
}

.remove{
color:#d32f2f;
cursor:pointer;
}

.summary{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-top:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
cursor:pointer;
width:100%;
}

.send{background:#2196f3;color:white}
.verify{background:#4caf50;color:white}
.place{background:black;color:white}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
padding:30px;
border-radius:20px;
width:320px;
text-align:center;
}

.pay-btn{
margin-top:10px;
}

.cod{background:#4caf50;color:white}
.online{background:#2196f3;color:white}

</style>
</head>

<body>

<header>Your Cart</header>

<div class="container">

<div id="cartBox"></div>

<div class="summary">

<h3>Total: ₹<span id="total">0</span></h3>

<input id="name" placeholder="Full Name">

<input id="phone" placeholder="Phone Number">

<textarea id="address" placeholder="Full Address"></textarea>

<button class="send" onclick="sendOTP()">Send OTP</button>

<input id="otpInput" placeholder="Enter OTP">

<button class="verify" onclick="verifyOTP()">Verify OTP</button>

<button class="place" onclick="openConfirm()">Place Order</button>

</div>

</div>


<div class="modal" id="confirmModal">
<div class="modal-box">
<h3>Confirm Order</h3>
<p>Are you sure you want to place this order?</p>
<button onclick="openPayment()">Yes</button>
<button onclick="closeConfirm()">Cancel</button>
</div>
</div>


<div class="modal" id="paymentModal">
<div class="modal-box">

<h3>Select Payment Method</h3>

<button class="pay-btn cod" onclick="placeOrder('COD')">
Cash On Delivery
</button>

<button class="pay-btn online" onclick="placeOrder('Online on delivery')">
Online on delivery
</button>

</div>
</div>


<script>

emailjs.init("4zPe-PgOyx0M15xLm")

const auth=firebase.auth()
const db=firebase.firestore()

let cart=[]
let total=0
let otp=""
let verified=false
let user=null

auth.onAuthStateChanged(u=>{

if(!u){

window.location="login.html"
return

}

user=u

cart=JSON.parse(localStorage.getItem("cart_"+user.email))||[]

renderCart()

})

function renderCart(){

let box=document.getElementById("cartBox")

box.innerHTML=""

total=0

if(cart.length==0){

box.innerHTML="<p>Cart Empty</p>"
document.getElementById("total").innerText=0
return

}

cart.forEach((item,i)=>{

total+=item.price*item.qty

box.innerHTML+=`

<div class="card">

<div class="row">

<b>${item.name}</b>

₹${item.price*item.qty}

</div>

<div class="row">

<div class="qty">

<button onclick="changeQty(${i},-1)">-</button>

${item.qty}

<button onclick="changeQty(${i},1)">+</button>

</div>

<div class="remove" onclick="removeItem(${i})">Remove</div>

</div>

</div>

`

})

document.getElementById("total").innerText=total

}

function changeQty(i,v){

cart[i].qty+=v

if(cart[i].qty<1) cart[i].qty=1

saveCart()
renderCart()

}

function removeItem(i){

cart.splice(i,1)

saveCart()
renderCart()

}

function saveCart(){

localStorage.setItem("cart_"+user.email,JSON.stringify(cart))

}

function sendOTP(){

if(cart.length==0){
alert("Cart Empty")
return
}

otp=Math.floor(100000+Math.random()*900000)

emailjs.send("madani_dates","template_w9iemq6",{

to_email:user.email,
otp:otp

}).then(()=>{

alert("OTP sent to your email")

})

}

function verifyOTP(){

let input=document.getElementById("otpInput").value

if(input==otp){

verified=true
alert("OTP verified")

}else{

alert("Wrong OTP")

}

}

function openConfirm(){

if(!verified){

alert("Verify OTP first")
return

}

document.getElementById("confirmModal").style.display="flex"

}

function closeConfirm(){

document.getElementById("confirmModal").style.display="none"

}

function openPayment(){

document.getElementById("confirmModal").style.display="none"
document.getElementById("paymentModal").style.display="flex"

}

function placeOrder(method){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let address=document.getElementById("address").value

if(!name||!phone||!address){

alert("Fill all details")
return

}

let orderID="MD"+Date.now()

db.collection("orders").add({

orderID:orderID,
items:cart,
total:total,
payment:method,
status:"Pending",
userEmail:user.email,

customer:{
name:name,
phone:phone,
address:address
},

created:firebase.firestore.FieldValue.serverTimestamp()

}).then(()=>{

localStorage.removeItem("cart_"+user.email)

alert("Order placed successfully")

window.location="success.html"

})

}

</script>

</body>
</html>
