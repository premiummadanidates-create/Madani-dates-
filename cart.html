<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Your Cart</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f6f8;
}

header{
background:#0f9d58;
color:white;
padding:18px;
font-size:20px;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
}

.qty-btn{
background:black;
color:white;
border:none;
width:32px;
height:32px;
border-radius:50%;
cursor:pointer;
}

.remove{
color:#d32f2f;
cursor:pointer;
}

.summary{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-top:20px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

.send{
background:#2196f3;
color:white;
width:100%;
}

.verify{
background:#4caf50;
color:white;
width:100%;
}

.place{
background:black;
color:white;
width:100%;
}

</style>
</head>

<body>

<header>Your Cart</header>

<div class="container">

<div id="cartBox"></div>

<div class="summary">

<h3>Total: ₹<span id="total">0</span></h3>

<input id="name" placeholder="Full Name">

<input id="phone" placeholder="Phone Number">

<textarea id="address" placeholder="Full Address"></textarea>

<button class="send" onclick="sendOTP()">Send OTP</button>

<input id="otpInput" placeholder="Enter OTP">

<button class="verify" onclick="verifyOTP()">Verify OTP</button>

<button class="place" onclick="placeOrder()">Place Order</button>

</div>

</div>

<script>

emailjs.init("4zPe-PgOyx0M15xLm")

const auth=firebase.auth()
const db=firebase.firestore()

let cart=[]
let total=0
let otp=""
let verified=false
let user=null

/* AUTH */

auth.onAuthStateChanged(u=>{

if(!u){
window.location="login.html"
return
}

user=u

cart=JSON.parse(localStorage.getItem("cart_"+user.email))||[]

renderCart()

})

/* CART */

function renderCart(){

let box=document.getElementById("cartBox")

box.innerHTML=""

total=0

if(cart.length==0){

box.innerHTML="<p>Cart Empty</p>"
return

}

cart.forEach((item,i)=>{

total+=item.price*item.qty

box.innerHTML+=`

<div class="card">

<div class="row">

<b>${item.name}</b>

₹${item.price*item.qty}

</div>

<div class="row">

<div>

<button class="qty-btn" onclick="changeQty(${i},-1)">-</button>

${item.qty}

<button class="qty-btn" onclick="changeQty(${i},1)">+</button>

</div>

<div class="remove" onclick="removeItem(${i})">Remove</div>

</div>

</div>

`

})

document.getElementById("total").innerText=total

}

/* QTY */

function changeQty(i,v){

cart[i].qty+=v

if(cart[i].qty<1) cart[i].qty=1

saveCart()
renderCart()

}

/* REMOVE */

function removeItem(i){

cart.splice(i,1)

saveCart()
renderCart()

}

function saveCart(){

localStorage.setItem("cart_"+user.email,JSON.stringify(cart))

}

/* OTP */

function sendOTP(){

if(!user){
alert("Login first")
return
}

otp=Math.floor(100000+Math.random()*900000)

emailjs.send("madani_dates","template_w9iemq6",{

to_email:user.email,
otp:otp

}).then(()=>{

alert("OTP sent to your email")

}).catch(err=>{

alert("OTP failed: "+JSON.stringify(err))

})

}

/* VERIFY */

function verifyOTP(){

let input=document.getElementById("otpInput").value

if(input==otp){

verified=true
alert("OTP verified")

}else{

alert("Wrong OTP")

}

}

/* PLACE ORDER */

function placeOrder(){

if(!verified){

alert("Verify OTP first")
return

}

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let address=document.getElementById("address").value

if(!name||!phone||!address){

alert("Fill all details")
return

}

db.collection("orders").add({

items:cart,
total:total,
status:"Pending",
payment:"COD",
userEmail:user.email,

customer:{
name:name,
phone:phone,
address:address
},

created:firebase.firestore.FieldValue.serverTimestamp()

}).then(()=>{

localStorage.removeItem("cart_"+user.email)

alert("Order placed")

window.location="success.html"

})

}

</script>

</body>
</html>
