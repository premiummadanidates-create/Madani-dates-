<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Your Cart</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f6f8;
}

header{
background:#0f9d58;
color:white;
padding:18px;
font-size:20px;
font-weight:600;
}

.container{
max-width:900px;
margin:auto;
padding:25px;
}

.card{
background:white;
padding:20px;
border-radius:18px;
margin-bottom:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
}

.qty button{
width:30px;
height:30px;
border:none;
border-radius:50%;
background:black;
color:white;
cursor:pointer;
}

.remove{
color:red;
cursor:pointer;
}

.summary{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
margin-top:20px;
}

input,textarea{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-top:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
font-weight:600;
cursor:pointer;
}

.send{background:#2196f3;color:white}
.verify{background:#4caf50;color:white}
.place{background:black;color:white}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
padding:25px;
border-radius:20px;
width:320px;
text-align:center;
}

.modal-btn{
margin:10px;
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
}

.pay-btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

.cod{background:#4caf50;color:white}
.online{background:#2196f3;color:white}

</style>
</head>

<body>

<header>Your Cart</header>

<div class="container">

<div id="cartBox"></div>

<div class="summary">

<h3>Total ₹<span id="total">0</span></h3>

<input id="email" placeholder="Email">
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Address"></textarea>

<button class="send" onclick="sendOTP()">Send OTP</button>

<input id="otpInput" placeholder="Enter OTP">

<button class="verify" onclick="verifyOTP()">Verify OTP</button>

<button class="place" onclick="openConfirm()">Place Order</button>

</div>

</div>

<!-- CONFIRMATION -->

<div class="modal" id="confirmModal">
<div class="modal-box">

<h3>Confirm Order</h3>
<p>Are you sure you want to place order?</p>

<button class="modal-btn" onclick="openPayment()">Yes</button>
<button class="modal-btn" onclick="closeConfirm()">No</button>

</div>
</div>

<!-- PAYMENT -->

<div class="modal" id="paymentModal">
<div class="modal-box">

<h3>Select Payment</h3>

<button class="pay-btn cod" onclick="placeOrder('COD')">
Cash On Delivery
</button>

<button class="pay-btn online" onclick="placeOrder('Online payment on delivery')">
Online Payment On Delivery
</button>

</div>
</div>

<script>

emailjs.init("4zPe-PgOyx0M15xLm")

const auth=firebase.auth()
const db=firebase.firestore()

let cart=JSON.parse(localStorage.getItem("cart"))||[]
let total=0

let generatedOTP=""
let verified=false

auth.onAuthStateChanged(user=>{

if(!user){
window.location="login.html"
}

})

function renderCart(){

let box=document.getElementById("cartBox")
box.innerHTML=""
total=0

cart.forEach((item,i)=>{

total+=item.price*item.qty

box.innerHTML+=`

<div class="card">

<div class="row">
<strong>${item.name}</strong>
₹${item.price*item.qty}
</div>

<div class="row">

<div class="qty">
<button onclick="changeQty(${i},-1)">-</button>
${item.qty}
<button onclick="changeQty(${i},1)">+</button>
</div>

<div class="remove" onclick="removeItem(${i})">
Remove
</div>

</div>

</div>

`

})

document.getElementById("total").innerText=total

}

function changeQty(i,v){

cart[i].qty+=v
if(cart[i].qty<1)cart[i].qty=1

saveCart()
renderCart()

}

function removeItem(i){

cart.splice(i,1)

saveCart()
renderCart()

}

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart))
}

/* OTP */

function sendOTP(){

let email=document.getElementById("email").value.trim()

if(!email){
alert("Enter Email")
return
}

generatedOTP=Math.floor(100000+Math.random()*900000)

emailjs.send("madani_dates","template_w9iemq6",{
otp:generatedOTP,
to_email:email
})

.then(()=>{
alert("OTP Sent To Email")
})

.catch(()=>{
alert("Failed To Send OTP")
})

}

function verifyOTP(){

let userOTP=document.getElementById("otpInput").value

if(userOTP==generatedOTP){

verified=true
alert("OTP Verified")

}else{

alert("Wrong OTP")

}

}

/* CONFIRM */

function openConfirm(){

if(!verified){
alert("Verify OTP First")
return
}

document.getElementById("confirmModal").style.display="flex"

}

function closeConfirm(){

document.getElementById("confirmModal").style.display="none"

}

function openPayment(){

document.getElementById("confirmModal").style.display="none"
document.getElementById("paymentModal").style.display="flex"

}

/* ORDER */

function placeOrder(method){

let user=auth.currentUser

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let address=document.getElementById("address").value
let email=document.getElementById("email").value

db.collection("orders").add({

items:cart,
total:total,
payment:method,
status:"Pending",
userEmail:user.email.toLowerCase(),
customer:{name,phone,address,email},
created:firebase.firestore.FieldValue.serverTimestamp()

})

.then(()=>{

localStorage.removeItem("cart")

window.location="success.html"

})

}

renderCart()

</script>

</body>
</html>
