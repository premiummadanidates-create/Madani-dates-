<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6f8}
header{background:#0f9d58;color:white;padding:18px;font-size:20px}
.container{max-width:900px;margin:auto;padding:25px}
.card{background:white;padding:18px;margin-bottom:12px;border-radius:18px;box-shadow:0 10px 25px rgba(0,0,0,0.08)}
.row{display:flex;justify-content:space-between;align-items:center}
.qty-btn{background:black;color:white;border:none;width:28px;height:28px;border-radius:50%;cursor:pointer}
.remove{color:red;font-size:14px;cursor:pointer}
.summary{background:white;padding:20px;border-radius:18px;box-shadow:0 10px 25px rgba(0,0,0,0.08);margin-top:20px}
input,textarea{width:100%;padding:10px;margin-top:10px;border-radius:10px;border:1px solid #ddd}
button{width:100%;margin-top:10px;padding:12px;border:none;border-radius:10px;cursor:pointer}
.send{background:#2196f3;color:white}
.verify{background:#4caf50;color:white}
.place{background:black;color:white}
.msg{margin-top:8px;font-size:13px;color:#666}
</style>
</head>

<body>

<header>Your Cart</header>

<div class="container">

<div id="cartBox"></div>

<div class="summary">

<h3>Total: ₹<span id="total">0</span></h3>

<input id="email" type="email" placeholder="Enter your Gmail">
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<textarea id="address" rows="3" placeholder="Address"></textarea>

<button class="send" onclick="sendOTP()">Send OTP</button>
<div class="msg" id="sendMsg"></div>

<input id="otpInput" placeholder="Enter OTP">

<button class="verify" onclick="verifyOTP()">Verify OTP</button>
<div class="msg" id="verifyMsg"></div>

<button class="place" onclick="placeOrder()">Place Order</button>

</div>

</div>

<script>
// ===== EmailJS Init =====
emailjs.init("TYTHM8wcS8EZRYr_C"); // PUBLIC KEY

// ===== Firebase =====
const auth = firebase.auth();
const db = firebase.firestore();

// ===== Cart =====
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

// ===== OTP State =====
let generatedOTP = null;
let otpVerified = false;

// ===== Render Cart =====
function renderCart(){
  const box = document.getElementById("cartBox");
  box.innerHTML = "";
  total = 0;

  if(cart.length === 0){
    box.innerHTML = "<p>Cart is empty</p>";
    document.getElementById("total").innerText = 0;
    return;
  }

  cart.forEach((item,i)=>{
    total += item.price * item.qty;

    box.innerHTML += `
      <div class="card">
        <div class="row">
          <strong>${item.name}</strong>
          ₹${item.price * item.qty}
        </div>

        <div class="row" style="margin-top:8px">
          <div>
            <button class="qty-btn" onclick="changeQty(${i},-1)">-</button>
            ${item.qty}
            <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
          </div>

          <div class="remove" onclick="removeItem(${i})">Remove</div>
        </div>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

// ===== Qty Change =====
function changeQty(i,v){
  cart[i].qty += v;
  if(cart[i].qty <= 1) cart[i].qty = 1;
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

// ===== Remove Item =====
function removeItem(i){
  cart.splice(i,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

// ===== Send OTP =====
function sendOTP(){
  const email = document.getElementById("email").value.trim();
  const msg = document.getElementById("sendMsg");

  if(!email){
    msg.innerText = "Enter email first";
    return;
  }

  generatedOTP = Math.floor(100000 + Math.random()*900000);

  emailjs.send("madani_dates","otp_madani",{ // SERVICE_ID , TEMPLATE_ID
    otp: generatedOTP,
    to_email: email
  })
  .then(()=>{
    msg.innerText = "OTP sent to your Gmail";
  })
  .catch((e)=>{
    console.error(e);
    msg.innerText = "Failed to send OTP";
  });
}

// ===== Verify OTP =====
function verifyOTP(){
  const entered = document.getElementById("otpInput").value.trim();
  const msg = document.getElementById("verifyMsg");

  if(!generatedOTP){
    msg.innerText = "Send OTP first";
    return;
  }

  if(entered == generatedOTP){
    otpVerified = true;
    msg.innerText = "OTP verified";
  }else{
    msg.innerText = "Wrong OTP";
  }
}

// ===== Place Order =====
function placeOrder(){
  if(!otpVerified){
    alert("Verify OTP first");
    return;
  }

  const email = document.getElementById("email").value.trim();
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const address = document.getElementById("address").value.trim();

  if(!email || !name || !phone || !address){
    alert("Fill all details");
    return;
  }

  db.collection("orders").add({
    items: cart,
    total: total,
    userEmail: email.toLowerCase(),
    status: "Pending",
    customer: {name,phone,address},
    created: firebase.firestore.FieldValue.serverTimestamp()
  })
  .then(()=>{
    localStorage.removeItem("cart");
    alert("Order placed successfully");
    window.location = "orders.html";
  })
  .catch((e)=>{
    console.error(e);
    alert("Order failed");
  });
}

renderCart();
</script>

</body>
</html>
