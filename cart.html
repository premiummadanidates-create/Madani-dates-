<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f6f8
}

header{
background:#0f9d58;
color:white;
padding:18px;
font-size:20px
}

.container{
max-width:900px;
margin:auto;
padding:30px
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08)
}

.row{
display:flex;
justify-content:space-between;
align-items:center
}

.qty-btn{
background:black;
color:white;
border:none;
width:30px;
height:30px;
border-radius:50%;
cursor:pointer
}

.remove{
color:#d32f2f;
cursor:pointer
}

.summary{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-top:20px
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd
}

button{
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
cursor:pointer
}

.send{background:#2196f3;color:white;width:100%}
.verify{background:#4caf50;color:white;width:100%}
.place{background:black;color:white;width:100%}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center
}

.modal-box{
background:white;
padding:30px;
border-radius:20px;
width:320px;
text-align:center
}

.pay-btn{
width:100%;
margin-top:10px
}

.cod{background:#4caf50;color:white}
.online{background:#2196f3;color:white}

</style>
</head>

<body>

<header>Your Cart</header>

<div class="container">

<div id="cartBox"></div>

<div class="summary">

<h3>Total: ₹<span id="total">0</span></h3>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button class="send" onclick="sendOTP()">Send OTP</button>

<input id="otpInput" placeholder="Enter OTP">

<button class="verify" onclick="verifyOTP()">Verify OTP</button>

<button class="place" onclick="openConfirm()">Place Order</button>

</div>

</div>

<div class="modal" id="confirmModal">
<div class="modal-box">
<h3>Confirm Order</h3>
<button onclick="openPayment()">Confirm</button>
<button onclick="closeConfirm()">Cancel</button>
</div>
</div>

<div class="modal" id="paymentModal">
<div class="modal-box">
<h3>Select Payment</h3>
<button class="pay-btn cod" onclick="placeOrder('COD')">Cash On Delivery</button>
<button class="pay-btn online" onclick="placeOrder('Online on delivery')">Online on delivery</button>
</div>
</div>

<script>

emailjs.init("4zPe-PgOyx0M15xLm")

const auth=firebase.auth()
const db=firebase.firestore()

let cart=[]
let total=0
let otp=""
let verified=false
let currentUser=null

/* AUTH CHECK */

auth.onAuthStateChanged(user=>{

if(!user){
window.location="login.html"
return
}

currentUser=user

cart=JSON.parse(localStorage.getItem("cart_"+user.email))||[]

renderCart()

})

/* RENDER CART */

function renderCart(){

total=0

let box=document.getElementById("cartBox")

box.innerHTML=""

if(cart.length==0){
box.innerHTML="<p>Cart empty</p>"
document.getElementById("total").innerText=0
return
}

cart.forEach((item,i)=>{

total+=item.price*item.qty

box.innerHTML+=`

<div class="card">

<div class="row">
<b>${item.name}</b>
₹${item.price*item.qty}
</div>

<div class="row">

<div>

<button class="qty-btn" onclick="changeQty(${i},-1)">-</button>

${item.qty}

<button class="qty-btn" onclick="changeQty(${i},1)">+</button>

</div>

<div class="remove" onclick="removeItem(${i})">Remove</div>

</div>

</div>

`

})

document.getElementById("total").innerText=total

}

/* QTY CHANGE */

function changeQty(i,v){

cart[i].qty+=v

if(cart[i].qty<1) cart[i].qty=1

saveCart()

renderCart()

}

/* REMOVE */

function removeItem(i){

cart.splice(i,1)

saveCart()

renderCart()

}

/* SAVE CART */

function saveCart(){

localStorage.setItem("cart_"+currentUser.email,JSON.stringify(cart))

}

/* SEND OTP */

function sendOTP(){

if(cart.length==0){
alert("Cart empty")
return
}

const user=currentUser

otp=Math.floor(100000+Math.random()*900000)

emailjs.send("madani_dates","template_otp",{

to_email:user.email,
otp:otp

}).then(()=>{

alert("OTP sent to your email")

}).catch(()=>{

alert("Failed to send OTP")

})

}

/* VERIFY OTP */

function verifyOTP(){

let input=document.getElementById("otpInput").value

if(input==otp){

verified=true
alert("OTP verified")

}else{

alert("Wrong OTP")

}

}

/* OPEN CONFIRM */

function openConfirm(){

if(!verified){
alert("Verify OTP first")
return
}

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let address=document.getElementById("address").value

if(!name||!phone||!address){
alert("Fill all details")
return
}

document.getElementById("confirmModal").style.display="flex"

}

/* CLOSE */

function closeConfirm(){
document.getElementById("confirmModal").style.display="none"
}

/* OPEN PAYMENT */

function openPayment(){

document.getElementById("confirmModal").style.display="none"

document.getElementById("paymentModal").style.display="flex"

}

/* PLACE ORDER */

function placeOrder(method){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let address=document.getElementById("address").value

db.collection("orders").add({

items:cart,

total:total,

payment:method,

status:"Pending",

userEmail:currentUser.email,

customer:{
name:name,
phone:phone,
address:address
},

created:firebase.firestore.FieldValue.serverTimestamp()

}).then(()=>{

localStorage.removeItem("cart_"+currentUser.email)

window.location="success.html"

})

}

</script>

</body>
</html>
