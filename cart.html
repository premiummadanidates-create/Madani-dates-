<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f6f8;
}

header{
background:#0f9d58;
color:white;
padding:18px;
font-size:20px;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
}

.qty-btn{
background:black;
color:white;
border:none;
width:30px;
height:30px;
border-radius:50%;
cursor:pointer;
}

.remove{
color:red;
cursor:pointer;
}

.summary{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-top:20px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
font-weight:bold;
cursor:pointer;
}

.send{
background:#2196f3;
color:white;
}

.verify{
background:#4caf50;
color:white;
}

.place{
background:black;
color:white;
}

</style>

</head>

<body>

<header>Your Cart</header>

<div class="container">

<div id="cartBox"></div>

<div class="summary">

<h3>Total: ₹<span id="total">0</span></h3>

<input id="email" placeholder="Email">
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button class="send" onclick="sendOTP()">
Send OTP
</button>

<input id="otpInput" placeholder="Enter OTP">

<button class="verify" onclick="verifyOTP()">
Verify OTP
</button>

<button class="place" onclick="placeOrder()">
Place Order
</button>

</div>

</div>

<script>

/* EMAILJS INIT */

(function(){
emailjs.init("4zPe-PgOyx0M15xLm");
})();

/* CART */

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

function renderCart(){

let box=document.getElementById("cartBox");
box.innerHTML="";
total=0;

cart.forEach((item,i)=>{

total += item.price * item.qty;

box.innerHTML+=`

<div class="card">

<div class="row">

<b>${item.name}</b>

₹${item.price * item.qty}

</div>

<div class="row">

<div>

<button class="qty-btn" onclick="changeQty(${i},-1)">-</button>

${item.qty}

<button class="qty-btn" onclick="changeQty(${i},1)">+</button>

</div>

<div class="remove" onclick="removeItem(${i})">
Remove
</div>

</div>

</div>

`;

});

document.getElementById("total").innerText=total;

}

function changeQty(i,v){

cart[i].qty+=v;

if(cart[i].qty<1)cart[i].qty=1;

saveCart();
renderCart();

}

function removeItem(i){

cart.splice(i,1);

saveCart();
renderCart();

}

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
}

/* OTP SYSTEM */

let generatedOTP="";
let verified=false;

function sendOTP(){

let email=document.getElementById("email").value.trim();

if(!email){
alert("Enter Email");
return;
}

generatedOTP=Math.floor(100000+Math.random()*900000);

emailjs.send("madani_dates","template_w9iemq6",{

otp:generatedOTP,
to_email:email

}).then(()=>{

alert("OTP sent to your email");

}).catch(()=>{

alert("Failed to send OTP");

});

}

/* VERIFY */

function verifyOTP(){

let userOTP=document.getElementById("otpInput").value;

if(userOTP==generatedOTP){

verified=true;

alert("OTP Verified");

}else{

alert("Wrong OTP");

}

}

/* PLACE ORDER */

function placeOrder(){

if(!verified){
alert("Verify OTP first");
return;
}

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;
let email=document.getElementById("email").value;

db.collection("orders").add({

items:cart,
total:total,
customer:{name,phone,address,email},
status:"Pending",
created:new Date()

}).then(()=>{

localStorage.removeItem("cart");

alert("Order Placed");

location.href="orders.html";

});

}

renderCart();

</script>

</body>
</html>
