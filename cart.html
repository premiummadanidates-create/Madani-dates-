<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f6f8;
}

header{
background:#0f9d58;
color:white;
padding:18px;
font-size:20px;
}

.container{
max-width:900px;
margin:auto;
padding:25px;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
}

.qty-btn{
background:black;
color:white;
border:none;
width:30px;
height:30px;
border-radius:50%;
cursor:pointer;
}

.remove{
color:red;
cursor:pointer;
font-size:14px;
}

.summary{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-top:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
width:100%;
}

.send{
background:#2196f3;
color:white;
}

.verify{
background:#4caf50;
color:white;
}

.place{
background:black;
color:white;
}

</style>

</head>

<body>

<header>Your Cart</header>

<div class="container">

<div id="cartBox"></div>

<div class="summary">

<h3>Total: ₹<span id="total">0</span></h3>

<input type="email" id="email" placeholder="Enter your Gmail">

<input type="text" id="name" placeholder="Full Name">

<input type="text" id="phone" placeholder="Phone Number">

<textarea id="address" rows="3" placeholder="Address"></textarea>

<button class="send" onclick="sendOTP()">Send OTP</button>

<input type="text" id="otpInput" placeholder="Enter OTP">

<button class="verify" onclick="verifyOTP()">Verify OTP</button>

<button class="place" onclick="placeOrder()">Place Order</button>

</div>

</div>

<script>

emailjs.init("TYTHM8wcS8EZRYr_C")

const auth = firebase.auth()
const db = firebase.firestore()

let cart = JSON.parse(localStorage.getItem("cart")) || []
let total = 0

let generatedOTP = null
let otpVerified = false

function renderCart(){

const box=document.getElementById("cartBox")
box.innerHTML=""
total=0

cart.forEach((item,i)=>{

total += item.price * item.qty

box.innerHTML += `

<div class="card">

<div class="row">
<strong>${item.name}</strong>
₹${item.price * item.qty}
</div>

<div class="row" style="margin-top:10px">

<div>

<button class="qty-btn" onclick="changeQty(${i},-1)">-</button>

${item.qty}

<button class="qty-btn" onclick="changeQty(${i},1)">+</button>

</div>

<div class="remove" onclick="removeItem(${i})">Remove</div>

</div>

</div>

`

})

document.getElementById("total").innerText = total

}

function changeQty(i,v){

cart[i].qty += v

if(cart[i].qty <= 1) cart[i].qty = 1

localStorage.setItem("cart",JSON.stringify(cart))

renderCart()

}

function removeItem(i){

cart.splice(i,1)

localStorage.setItem("cart",JSON.stringify(cart))

renderCart()

}

function sendOTP(){

let email=document.getElementById("email").value

if(!email){
alert("Enter your email")
return
}

generatedOTP = Math.floor(100000 + Math.random() * 900000)

emailjs.send("madani_dates","otp_madani",{

otp: generatedOTP,
to_email: email

}).then(function(){

alert("Your OTP is sent to your Gmail")

})

}

function verifyOTP(){

let entered=document.getElementById("otpInput").value

if(entered == generatedOTP){

otpVerified = true
alert("OTP verified")

}else{

alert("Wrong OTP")

}

}

function placeOrder(){

if(!otpVerified){

alert("Verify OTP first")
return

}

let email=document.getElementById("email").value
let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let address=document.getElementById("address").value

db.collection("orders").add({

items:cart,
total:total,
payment:"COD",
userEmail:email.toLowerCase(),
status:"Pending",
customer:{name,phone,address},
created:firebase.firestore.FieldValue.serverTimestamp()

}).then(()=>{

localStorage.removeItem("cart")

alert("Order placed successfully")

window.location="orders.html"

})

}

renderCart()

</script>

</body>
</html>
