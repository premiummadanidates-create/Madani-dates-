<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Madani Dates</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f6f8;
}

/* HEADER */

header{
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.logo{
font-size:22px;
font-weight:600;
color:#0f9d58;
}

.menu a{
margin-left:18px;
text-decoration:none;
color:#333;
font-weight:600;
}

.logout{
background:#ff4d4d;
color:white;
padding:8px 14px;
border-radius:8px;
}

/* HERO */

.hero{
padding:90px 20px;
background:linear-gradient(135deg,#0f9d58,#0b5c2e);
color:white;
text-align:center;
border-bottom-left-radius:60px;
border-bottom-right-radius:60px;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
padding:40px;
}

.card{
background:white;
border-radius:20px;
padding:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
position:relative;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:15px;
}

/* DISCOUNT */

.discount{
position:absolute;
top:12px;
left:12px;
background:red;
color:white;
font-size:12px;
padding:5px 10px;
border-radius:15px;
}

/* PRICE */

.old{
text-decoration:line-through;
color:#888;
font-size:14px;
}

.price{
color:#0f9d58;
font-size:18px;
font-weight:700;
}

/* ADD BUTTON */

.add{
background:black;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:12px;
margin-top:12px;
cursor:pointer;
}

.add:disabled{
background:#ccc;
cursor:not-allowed;
}

/* OUT OF STOCK STAMP */

.stock-stamp{
position:absolute;
top:28%;
left:50%;
transform:translate(-50%,-50%) rotate(-20deg);
width:160px;
opacity:0.95;
pointer-events:none;
}

.out-card{
opacity:0.65;
}

/* CART BUTTON */

.cart-float{
position:fixed;
bottom:25px;
right:25px;
background:#0f9d58;
color:white;
padding:15px 22px;
border-radius:35px;
font-weight:600;
box-shadow:0 8px 25px rgba(0,0,0,0.25);
cursor:pointer;
}

.cart-count{
background:red;
color:white;
font-size:12px;
padding:3px 7px;
border-radius:50%;
margin-left:6px;
}

/* CONTACT */

.manager{
margin:40px;
background:white;
padding:30px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
text-align:center;
}

.manager button{
padding:12px 20px;
border:none;
border-radius:10px;
margin:8px;
cursor:pointer;
font-weight:600;
}

.call{
background:#0f9d58;
color:white;
}

.whatsapp{
background:#25D366;
color:white;
}

.instagram{
background:#E1306C;
color:white;
}

</style>
</head>

<body>

<header>

<div class="logo">Madani Dates</div>

<div class="menu">
<a href="orders.html">My Orders</a>
<a href="#" class="logout">Logout</a>
</div>

</header>


<div class="hero">

<h2>Premium Quality Dates</h2>
<p>Fresh • Organic • Best Prices</p>

</div>


<div class="products" id="products"></div>


<!-- CONTACT SECTION -->

<div class="manager">

<h3>Contact Web Manager</h3>

<p>If website not working please contact</p>

<button class="call"
onclick="window.location='tel:+917977212461'">

📞 Call Web Manager

</button>

<button class="whatsapp"
onclick="window.open('https://wa.me/917977212461')">

💬 WhatsApp Web Manager

</button>

<button class="instagram"
onclick="window.open('https://www.instagram.com/madanidatesofficial?utm_source=qr&igsh=YTJnNnR3ZGpzbGRt')">

📷 Instagram

</button>

</div>


<!-- CART BUTTON -->

<a href="cart.html">

<div class="cart-float">

Go To Cart
<span class="cart-count" id="cartCount">0</span>

</div>

</a>


<script>

const db=firebase.firestore()

let cart=JSON.parse(localStorage.getItem("cart"))||[]

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart))
updateCartCount()
}

function updateCartCount(){

let count=0

cart.forEach(i=>count+=i.qty)

document.getElementById("cartCount").innerText=count

}

function addCart(name,price,btn){

let item=cart.find(p=>p.name===name)

if(item){
item.qty++
}else{
cart.push({name,price,qty:1})
}

saveCart()

}

function openProduct(id){
window.location="product.html?id="+id
}


/* LOAD PRODUCTS */

db.collection("products").onSnapshot(snapshot=>{

let html=""

snapshot.forEach(doc=>{

let p=doc.data()

html+=`

<div class="card ${!p.stock ? 'out-card' : ''}" ${p.stock ? `onclick="openProduct('${doc.id}')"` : ''}>

<div class="discount">${p.discount || 30}%</div>

<img src="${p.image}">

${!p.stock ? `<img src="images/out-of-stock.png" class="stock-stamp">` : ''}

<h3>${p.name}</h3>

<div class="old">₹${p.oldPrice}</div>
<div class="price">₹${p.price}</div>

<button class="add"
${!p.stock ? 'disabled' : ''}
onclick="event.stopPropagation();addCart('${p.name}',${p.price},this)">
${!p.stock ? 'Out Of Stock' : 'Add To Cart'}
</button>

</div>

`

})

document.getElementById("products").innerHTML=html

})

updateCartCount()

</script>

</body>
</html>
