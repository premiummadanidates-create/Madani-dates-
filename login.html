<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
font-family: Arial;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:8px;
background:#4285F4;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<button id="googleLogin">Login with Google</button>

<script type="module">

import { auth, provider } from "./firebase.js";
import { signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const btn = document.getElementById("googleLogin");

btn.addEventListener("click", () => {

signInWithPopup(auth, provider)

.then((result)=>{

// login success
window.location.href = "index.html";

})

.catch((error)=>{
alert(error.message);
});

});

</script>

</body>
</html>
