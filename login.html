<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Login - Madani Dates</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="firebase.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f9d58,#06341a);
}

/* LOGIN CARD */

.login-box{
background:white;
padding:45px 35px;
border-radius:28px;
width:340px;
text-align:center;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
animation:fadeIn .6s ease;
}

/* LOGO */

.logo{
width:75px;
height:75px;
border-radius:50%;
background:#0f9d58;
margin:auto;
margin-bottom:20px;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:28px;
font-weight:bold;
}

/* TEXT */

.login-box h2{
margin:0;
color:#0f9d58;
margin-bottom:8px;
}

.login-box p{
opacity:0.7;
font-size:14px;
margin-bottom:25px;
}

/* BUTTON */

.google-btn{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
width:100%;
padding:14px;
border:none;
border-radius:35px;
background:black;
color:white;
cursor:pointer;
font-size:15px;
transition:0.25s;
}

.google-btn:hover{
background:#0f9d58;
transform:scale(1.04);
}

.loading{
display:none;
margin-top:12px;
color:#0f9d58;
font-size:14px;
}

/* ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */

@media(max-width:500px){

.login-box{
width:90%;
padding:35px 25px;
}

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">MD</div>

<h2>Madani Dates</h2>

<p>Premium Quality Dates Delivered Fresh</p>

<button class="google-btn" onclick="login()">
Sign in with Google
</button>

<div class="loading" id="loading">
Logging in...
</div>

</div>

<script>

const auth = firebase.auth();

/* IF ALREADY LOGGED IN */

auth.onAuthStateChanged(user=>{

if(user){

window.location.href="index.html";

}

});

/* LOGIN FUNCTION */

function login(){

document.getElementById("loading").style.display="block";

const provider = new firebase.auth.GoogleAuthProvider();

/* MOBILE + DESKTOP LOGIN */

auth.signInWithRedirect(provider);

}

/* AFTER REDIRECT */

auth.getRedirectResult()

.then(result=>{

if(result.user){

window.location.href="index.html";

}

})

.catch(err=>{

console.log(err);

});

</script>

</body>
</html>
