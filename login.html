<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - Madani Dates</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="firebase.js"></script>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f9d58,#0a3d1f);
}

.login-box{
  background:white;
  padding:40px;
  border-radius:25px;
  width:320px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.login-box h2{
  margin:0 0 10px;
  color:#0f9d58;
}

.login-box p{
  font-size:14px;
  opacity:0.7;
  margin-bottom:25px;
}

.google-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:black;
  color:white;
  border:none;
  padding:12px;
  width:100%;
  border-radius:30px;
  cursor:pointer;
  transition:0.3s;
}

.google-btn:hover{
  background:#0f9d58;
}

.logo-circle{
  width:70px;
  height:70px;
  border-radius:50%;
  background:#0f9d58;
  margin:auto;
  margin-bottom:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:26px;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="login-box">
<div class="logo-circle">MD</div>
<h2>Madani Dates</h2>
<p>Premium Quality Dates Delivered Fresh</p>

<button class="google-btn" onclick="login()">
Sign in with Google
</button>

</div>

<script>
const auth = firebase.auth();

auth.onAuthStateChanged(user=>{
  if(user){
    window.location="index.html";
  }
});

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
  .catch(err=>alert(err.message));
}
</script>

</body>
</html>
