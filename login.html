<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Login - Madani Dates</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="firebase.js"></script>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f9d58,#06341a);
}

.box{
background:white;
padding:40px;
border-radius:25px;
width:320px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.logo{
width:70px;
height:70px;
border-radius:50%;
background:#0f9d58;
margin:auto;
margin-bottom:20px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:26px;
font-weight:bold;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:30px;
background:black;
color:white;
cursor:pointer;
font-size:15px;
}

</style>

</head>

<body>

<div class="box">

<div class="logo">MD</div>

<h2>Madani Dates</h2>

<button onclick="login()">Sign in with Google</button>

</div>

<script>

const auth = firebase.auth();

/* LOGIN FUNCTION */

function login(){

const provider = new firebase.auth.GoogleAuthProvider();

auth.signInWithRedirect(provider);

}

/* REDIRECT RESULT */

auth.getRedirectResult().then(result=>{

if(result.user){

window.location.replace("index.html");

}

});

/* IF ALREADY LOGGED IN */

auth.onAuthStateChanged(user=>{

if(user){

window.location.replace("index.html");

}

});

</script>

</body>
</html>
