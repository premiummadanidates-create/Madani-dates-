<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>My Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<style>

/* GLOBAL */

body{
margin:0;
font-family:Segoe UI;
background:#f4f6f8;
}

/* HEADER */

header{
background:#0f9d58;
color:white;
padding:18px;
display:flex;
align-items:center;
font-size:20px;
font-weight:600;
}

.back{
margin-right:15px;
cursor:pointer;
font-size:18px;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:25px;
}

/* ORDER CARD */

.order{
background:white;
padding:22px;
border-radius:22px;
margin-bottom:20px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
transition:.3s;
}

.order:hover{
transform:translateY(-4px);
}

/* STATUS */

.status{
font-weight:bold;
margin-bottom:5px;
}

/* DELIVERY TIME */

.time{
color:#0f9d58;
font-weight:bold;
margin-top:6px;
}

/* OTP BOX */

.otp{
background:#fff3cd;
padding:12px;
border-radius:12px;
margin-top:10px;
font-weight:bold;
}

/* TRACK BAR */

.track{
height:8px;
background:#ddd;
border-radius:10px;
margin-top:15px;
position:relative;
overflow:hidden;
}

.progress{
height:100%;
background:#0f9d58;
border-radius:10px;
transition:width .6s;
}

.truck{
position:absolute;
top:-18px;
font-size:22px;
}

/* EMPTY */

.empty{
text-align:center;
color:#666;
margin-top:50px;
font-size:18px;
}

/* LOADING */

.loading{
text-align:center;
margin-top:50px;
font-size:18px;
color:#777;
}

</style>

</head>

<body>

<header>

My Orders

</header>

<div class="container">

<div id="orders" class="loading">
Loading Orders...
</div>

</div>

<script>

const auth = firebase.auth()
const db = firebase.firestore()

/* LOGIN CHECK */

auth.onAuthStateChanged(user=>{

if(!user){

window.location="login.html"

return

}

loadOrders(user)

})

/* LOAD ORDERS */

function loadOrders(user){

db.collection("orders")

.where("userEmail","==",user.email.toLowerCase())

.orderBy("created","desc")

.onSnapshot(snapshot=>{

const box=document.getElementById("orders")

if(snapshot.empty){

box.innerHTML='<div class="empty">No Orders Yet</div>'

return

}

let html=""

snapshot.forEach(doc=>{

let o=doc.data()

let percent=10

if(o.status==="Packed") percent=40
if(o.status==="Out for Delivery") percent=75
if(o.status==="Delivered") percent=100

let otpBox=""

if(o.status==="Out for Delivery" && o.deliveryOTP){

otpBox=`

<div class="otp">

Delivery OTP: ${o.deliveryOTP}

<br>

Show this OTP to delivery boy

</div>

`

}

html+=`

<div class="order">

<div class="status">

Status: ${o.status}

</div>

<div>

Total: ₹${o.total}

</div>

<div class="time">

Estimated Delivery: ${o.deliveryTime || "Not set"}

</div>

${otpBox}

<div class="track">

<div class="progress" style="width:${percent}%"></div>

<div class="truck" style="left:${percent}%">

🚚

</div>

</div>

</div>

`

})

box.innerHTML=html

})

}

</script>

</body>
</html>
